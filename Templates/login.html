<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APHPM — Connexion Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#0d1f3c; --gold:#c8922a; --cream:#faf8f4; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'DM Sans',sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, #1a3a6b 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .card {
      background:var(--cream); border-radius:24px; padding:56px 48px;
      width:100%; max-width:440px;
      box-shadow:0 32px 80px rgba(0,0,0,0.3);
    }
    .logo { text-align:center; margin-bottom:40px; }
    .logo-emblem {
      width:64px; height:64px; border-radius:50%;
      background:var(--navy); color:var(--gold);
      font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:700;
      display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
    }
    .logo h1 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; color:var(--navy); }
    .logo p { font-size:0.8rem; color:#6b7280; margin-top:4px; }
    .form-group { margin-bottom:20px; }
    label { display:block; font-size:0.78rem; font-weight:700; color:var(--navy); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
    input {
      width:100%; padding:13px 16px;
      border:1.5px solid #e0ddd8; border-radius:10px;
      font-family:'DM Sans',sans-serif; font-size:0.9rem;
      background:#fff; outline:none; transition:all 0.2s;
    }
    input:focus { border-color:var(--navy); box-shadow:0 0 0 3px rgba(13,31,60,0.08); }
    .btn {
      width:100%; padding:14px;
      background:var(--navy); color:#fff; border:none;
      border-radius:50px; font-family:'DM Sans',sans-serif;
      font-size:0.92rem; font-weight:600; cursor:pointer; transition:all 0.3s;
      margin-top:8px;
    }
    .btn:hover { background:#1a3a6b; transform:translateY(-2px); box-shadow:0 8px 24px rgba(13,31,60,0.25); }
    .error {
      background:#fef2f2; border:1px solid #fecaca;
      color:#dc2626; padding:12px 16px; border-radius:10px;
      font-size:0.88rem; margin-bottom:20px; text-align:center;
    }
    .back { text-align:center; margin-top:24px; }
    .back a { color:var(--gold); font-size:0.85rem; text-decoration:none; font-weight:500; }
    .back a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-emblem">A</div>
      <h1>Espace Admin</h1>
      <p>Panneau d'administration APHPM</p>
    </div>
    {% if erreur %}
    <div class="error">⚠️ {{ erreur }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" name="username" placeholder="admin" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Se connecter →</button>
    </form>
    <div class="back"><a href="/">← Retour au site</a></div>
  </div>
</body>
</html>
